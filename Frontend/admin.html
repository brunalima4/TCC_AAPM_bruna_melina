<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - AAPM SENAI</title>
    <style>
        /* Estilos base mantidos do seu código original */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f8f4e6;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: #ffffff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .sidebar.closed {
            width: 0;
            opacity: 0;
            pointer-events: none;
        }

        .menu-header {
            padding: 30px;
            height: 100px;
            display: flex;
            align-items: center;
        }

        /* --- ANIMAÇÃO MENU HAMBÚRGUER --- */
        .menu-icon {
            width: 30px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            z-index: 110;
        }

        .menu-icon span {
            display: block;
            height: 3px;
            width: 100%;
            background-color: #d1d1d1;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-icon.open span { background-color: #f11815; }
        .menu-icon.open span:nth-child(1) { transform: translateY(8.5px) rotate(45deg); }
        .menu-icon.open span:nth-child(2) { opacity: 0; }
        .menu-icon.open span:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); }

        .nav-links {
            display: flex;
            flex-direction: column;
            white-space: nowrap;
        }

        .nav-links a {
            padding: 18px 30px;
            text-decoration: none;
            color: #333;
            font-size: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover { background-color: #f9f9f9; color: #f11815; }
        
        /* Destaque para a aba de retorno */
        .nav-links a.home-link {
            border-bottom: 1px solid #eee;
            color: #666;
        }

        .nav-links a.active { 
            color: #f11815; 
            font-weight: 700; 
            background-color: #fff1f0;
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .top-header {
            height: 100px;
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            position: relative;
        }

        .logo-central {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-text { color: #f11815; font-weight: 900; font-size: 42px; }

        /* --- CARDS --- */
        .cards-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .row { display: flex; gap: 40px; }

        .btn-card {
            background: linear-gradient(135deg, #f11815 0%, #b31210 100%);
            color: #ffffff;
            width: 320px;
            height: 200px;
            border: none;
            border-radius: 40px;
            font-size: 22px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(179, 18, 16, 0.3);
            transition: all 0.4s;
            padding: 20px;
        }

        .btn-card:hover {
            transform: translateY(-10px);
            filter: brightness(1.1);
        }

        .btn-special {
            background: linear-gradient(135deg, #444 0%, #111 100%);
        }

    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="menu-header">
            <div class="menu-icon open" id="menuIconSidebar" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <nav class="nav-links">
            <a href="landingpage.html" class="home-link">Tela Inicial</a>
            
            <a href="#">Meu perfil</a>
            <a href="#">Sugestões</a>
            <a href="#">Contato</a>
            <a href="#" class="active">Administrador</a>
        </nav>
    </aside>

    <div class="main-content">
        <header class="top-header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="menu-icon" id="openBtn" onclick="toggleMenu()" style="display: none;">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div style="background:#f1f1f1; padding:8px 15px; border-radius:30px; border:1px solid #ddd; width:250px;">
                    <input type="text" placeholder="Pesquisar" style="border:none; background:transparent; outline:none; width:100%;">
                </div>
            </div>

            <div class="logo-central">
                <span class="logo-text">AAPM</span>
                <img src="fotoss.png" alt="Logo" style="width: 70px;">
                <span class="logo-text">SENAI</span>
            </div>

            <div style="display: flex; align-items: center; gap: 20px;">
                <span style="font-size: 30px; cursor: pointer;">🔔</span>
                <div style="width:50px; height:50px; background:#f11815; border-radius:50%; display:flex; justify-content:center; align-items:center; color:white; font-weight:bold;">ADM</div>
            </div>
        </header>

        <section class="cards-section">
            <div class="row">
                <a href="page.html" style="text-decoration: none;">
                    <button class="btn-card">História da AAPM</button>
                </a>
<a href="eventos.html" style="text-decoration: none;">
                    <button class="btn-card">Eventos</button>
                </a>
                <button class="btn-card">Benefícios</button>
            </div>
            <div class="row">
                <button class="btn-card">Oficinas</button>
                <button class="btn-card">Avisos</button>
                <button class="btn-card btn-special" onclick="location.href='contribuintes.html'">Lista de Contribuintes</button>
            </div>
        </section>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const openBtn = document.getElementById('openBtn');
            const menuIconSidebar = document.getElementById('menuIconSidebar');
            
            sidebar.classList.toggle('closed');
            
            if (sidebar.classList.contains('closed')) {
                openBtn.style.display = 'flex';
                menuIconSidebar.classList.remove('open');
            } else {
                openBtn.style.display = 'none';
                menuIconSidebar.classList.add('open');
            }
        }
    </script>
</body>
</html>
